kind = "web"
previewPath = "/"
title = "South Point School"
version = "1.0.0"
id = "artifacts/south-point-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18159
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/south-point-school run dev"

[services.env]
PORT = "18159"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/south-point-school", "run", "build"]
publicDir = "artifacts/south-point-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
